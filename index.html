      searchButton.addEventListener("click",async ()=>

                console.log(current_condition[0].FeelsLikeC)
                var dat=current_condition[0].FeelsLikeC
                var x=document.createElement("p")
               
                x.innerText=dat
                 document.body.appendChild(x)
                
                console.log(res)
                console.log(data)


       
    })

      
    </script>
