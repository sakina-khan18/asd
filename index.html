<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Website with TOC</title>
</head>
<body>

<p></p>
<button> Click</button>
</body>
<script>
    var butto=document.querySelector("button");
    var counter=0;
    butto.addEventListener("click",function(){
        counter++;
     
            document.querySelector("p").innerHTML="<p>counter is "+counter+"</p>";
    })
    </script>
</html>
